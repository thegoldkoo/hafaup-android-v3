name: Extract Keystore (TEMP)
on: workflow_dispatch
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > hafaup-release.keystore
          ls -la hafaup-release.keystore
          echo "---SHA1 with password---"
          keytool -list -v -keystore hafaup-release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep -E "SHA1|SHA256|Alias"
      - uses: actions/upload-artifact@v4
        with:
          name: real-keystore
          path: hafaup-release.keystore
          retention-days: 1

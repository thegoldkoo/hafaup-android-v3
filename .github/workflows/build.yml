name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        mkdir -p app
        echo "$KEYSTORE_BASE64" | base64 -d > app/hafaup-release.keystore
        echo "✅ Keystore decoded"
        ls -la app/hafaup-release.keystore

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Build Release AAB
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        chmod +x ./gradlew
        ./gradlew bundleRelease \
          -PKEYSTORE_FILE=hafaup-release.keystore \
          -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
          -PKEY_ALIAS="$KEY_ALIAS" \
          -PKEY_PASSWORD="$KEY_PASSWORD"

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease \
          -PKEYSTORE_FILE=hafaup-release.keystore \
          -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
          -PKEY_ALIAS="$KEY_ALIAS" \
          -PKEY_PASSWORD="$KEY_PASSWORD"

    - name: Verify signing
      run: |
        keytool -printcert -jarfile app/build/outputs/bundle/release/app-release.aab | head -20

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: hafaup-release-aab
        path: app/build/outputs/bundle/release/*.aab

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: hafaup-release-apk
        path: app/build/outputs/apk/release/*.apk
